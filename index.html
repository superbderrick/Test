<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISC 행동유형 간이진단</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:#f0f4f8; color:#333; min-height:100vh; }
  .container { max-width:720px; margin:0 auto; padding:24px 16px; }

  /* Intro */
  .intro { background:#fff; border-radius:16px; padding:48px 32px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.06); }
  .intro h1 { font-size:28px; color:#1a365d; margin-bottom:8px; }
  .intro .sub { font-size:15px; color:#666; margin-bottom:24px; line-height:1.6; }
  .intro label { display:block; margin-bottom:16px; text-align:left; }
  .intro label span { font-size:13px; color:#555; display:block; margin-bottom:4px; }
  .intro input { width:100%; padding:10px 14px; border:1px solid #d1d5db; border-radius:8px; font-size:15px; font-family:inherit; }
  .intro .note { font-size:12px; color:#888; margin-bottom:24px; line-height:1.5; text-align:left; }

  /* Progress */
  .progress-wrap { background:#fff; border-radius:12px; padding:16px 24px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
  .progress-bar { height:6px; background:#e2e8f0; border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#3182ce,#2b6cb0); border-radius:3px; transition:width .3s; }
  .progress-text { font-size:13px; color:#888; margin-top:6px; text-align:right; }

  /* Question card */
  .q-card { background:#fff; border-radius:16px; padding:32px; box-shadow:0 2px 12px rgba(0,0,0,.06); margin-bottom:16px; }
  .q-card h2 { font-size:15px; color:#2b6cb0; margin-bottom:4px; }
  .q-card .q-text { font-size:17px; font-weight:500; margin-bottom:24px; line-height:1.5; }
  .q-card .q-desc { font-size:13px; color:#888; margin-bottom:20px; }

  .options { display:flex; flex-direction:column; gap:10px; }
  .opt { display:flex; align-items:center; gap:12px; padding:14px 16px; border:2px solid #e2e8f0; border-radius:12px; cursor:pointer; transition:all .15s; }
  .opt:hover { border-color:#90cdf4; background:#ebf8ff; }
  .opt.selected { border-color:#3182ce; background:#ebf8ff; }
  .opt .radio { width:20px; height:20px; border-radius:50%; border:2px solid #cbd5e0; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; }
  .opt.selected .radio { border-color:#3182ce; background:#3182ce; }
  .opt.selected .radio::after { content:''; width:8px; height:8px; border-radius:50%; background:#fff; }
  .opt .label { font-size:15px; line-height:1.4; }

  .scale-options { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .scale-opt { width:56px; height:56px; border-radius:12px; border:2px solid #e2e8f0; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:600; cursor:pointer; transition:all .15s; }
  .scale-opt:hover { border-color:#90cdf4; background:#ebf8ff; }
  .scale-opt.selected { border-color:#3182ce; background:#3182ce; color:#fff; }
  .scale-labels { display:flex; justify-content:space-between; margin-top:8px; font-size:12px; color:#999; padding:0 8px; }

  /* Buttons */
  .btn { display:inline-block; padding:12px 32px; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:all .15s; }
  .btn-primary { background:#2b6cb0; color:#fff; }
  .btn-primary:hover { background:#2c5282; }
  .btn-primary:disabled { background:#a0aec0; cursor:not-allowed; }
  .btn-secondary { background:#edf2f7; color:#4a5568; }
  .btn-secondary:hover { background:#e2e8f0; }
  .nav-btns { display:flex; justify-content:space-between; margin-top:24px; }

  /* Results */
  .results { background:#fff; border-radius:16px; padding:32px; box-shadow:0 2px 12px rgba(0,0,0,.06); }
  .results h1 { font-size:24px; color:#1a365d; margin-bottom:4px; }
  .results .name-line { font-size:14px; color:#888; margin-bottom:24px; }

  .type-banner { padding:24px; border-radius:12px; text-align:center; margin-bottom:24px; }
  .type-banner .type-label { font-size:14px; font-weight:500; margin-bottom:4px; }
  .type-banner .type-name { font-size:28px; font-weight:700; }
  .type-banner .type-desc { font-size:14px; margin-top:8px; line-height:1.5; opacity:.85; }

  .scores-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
  .score-box { padding:16px; border-radius:10px; text-align:center; }
  .score-box .s-label { font-size:13px; font-weight:500; margin-bottom:4px; }
  .score-box .s-value { font-size:32px; font-weight:700; }
  .score-box .s-name { font-size:12px; margin-top:2px; }

  .bar-chart { margin-bottom:24px; }
  .bar-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .bar-label { width:28px; font-size:18px; font-weight:700; text-align:center; flex-shrink:0; }
  .bar-bg { flex:1; height:28px; background:#edf2f7; border-radius:6px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:6px; transition:width .6s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; }
  .bar-fill span { font-size:12px; font-weight:600; color:#fff; }
  .bar-pct { width:40px; font-size:13px; font-weight:600; text-align:right; }

  .section { margin-bottom:24px; }
  .section h3 { font-size:16px; color:#2b6cb0; margin-bottom:12px; padding-bottom:6px; border-bottom:2px solid #ebf8ff; }
  .section p, .section li { font-size:14px; line-height:1.7; color:#4a5568; }
  .section ul { padding-left:20px; }
  .section li { margin-bottom:6px; }

  .trait-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .trait-card { padding:14px; border-radius:10px; background:#f7fafc; border:1px solid #e2e8f0; }
  .trait-card .tc-label { font-size:12px; font-weight:600; color:#718096; margin-bottom:4px; }
  .trait-card .tc-value { font-size:14px; color:#2d3748; }

  .copy-code { background:#f7fafc; border:1px solid #e2e8f0; border-radius:8px; padding:14px; margin:16px 0; font-family:monospace; font-size:13px; word-break:break-all; position:relative; cursor:pointer; }
  .copy-code:hover { background:#edf2f7; }
  .copy-code::after { content:'클릭하여 복사'; position:absolute; right:8px; top:8px; font-size:11px; color:#a0aec0; font-family:'Noto Sans KR',sans-serif; }

  .hidden { display:none; }
  @media(max-width:520px) {
    .container { padding:12px 8px; }
    .q-card, .results, .intro { padding:20px 16px; }
    .scores-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Intro -->
  <div id="intro" class="intro">
    <h1>DISC 행동유형 간이진단</h1>
    <p class="sub">나의 업무 행동 스타일을 파악하고<br>팀 소통에 활용할 수 있는 간이 진단입니다.</p>
    <label><span>이름</span><input id="userName" placeholder="결과지에 표시될 이름을 입력하세요" /></label>
    <label><span>소속 (선택)</span><input id="userTeam" placeholder="팀/부서명" /></label>
    <p class="note">
      * 이 진단은 공인 DISC 검사가 아닌 간이 버전입니다.<br>
      * 약 5~7분 소요되며, 총 24문항입니다.<br>
      * 정답은 없습니다. 직장에서의 평소 모습에 가장 가까운 것을 선택하세요.
    </p>
    <button class="btn btn-primary" onclick="startQuiz()">시작하기</button>
  </div>

  <!-- Quiz -->
  <div id="quiz" class="hidden">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
    <div class="q-card" id="qCard"></div>
  </div>

  <!-- Results -->
  <div id="results" class="results hidden"></div>
</div>

<script>
const questions = [
  // Each: { text, type:'choice'|'scale', options:[{text,scores:{D,I,S,C}}] }
  // Forced-choice (which is most like you)
  {text:"회의에서 결론이 나지 않을 때 나는 주로...", type:"choice", options:[
    {text:"내가 직접 방향을 정하고 결정을 내린다", scores:{D:3,I:0,S:0,C:0}},
    {text:"분위기를 살펴 다양한 의견을 이끌어낸다", scores:{D:0,I:3,S:0,C:0}},
    {text:"모두가 편한 합의점을 찾으려 노력한다", scores:{D:0,I:0,S:3,C:0}},
    {text:"더 많은 데이터와 근거를 요청한다", scores:{D:0,I:0,S:0,C:3}},
  ]},
  {text:"새로운 프로젝트를 시작할 때 나는...", type:"choice", options:[
    {text:"빠르게 실행 계획을 세우고 바로 착수한다", scores:{D:3,I:0,S:0,C:0}},
    {text:"팀원들과 아이디어를 나누며 열정적으로 시작한다", scores:{D:0,I:3,S:0,C:0}},
    {text:"기존 방식을 참고해 안정적으로 준비한다", scores:{D:0,I:0,S:3,C:0}},
    {text:"리스크와 세부사항을 꼼꼼히 분석한 후 시작한다", scores:{D:0,I:0,S:0,C:3}},
  ]},
  {text:"업무에서 갈등이 생겼을 때 나는...", type:"choice", options:[
    {text:"문제를 직접적으로 꺼내고 해결하려 한다", scores:{D:3,I:0,S:0,C:0}},
    {text:"유머나 대화로 분위기를 풀려고 한다", scores:{D:0,I:3,S:0,C:0}},
    {text:"상대의 입장을 먼저 이해하려 한다", scores:{D:0,I:0,S:3,C:0}},
    {text:"객관적 사실과 기준에 따라 판단한다", scores:{D:0,I:0,S:0,C:3}},
  ]},
  {text:"팀에서 나의 역할은 주로...", type:"choice", options:[
    {text:"목표를 설정하고 추진력을 만드는 사람", scores:{D:3,I:0,S:0,C:0}},
    {text:"사람들을 연결하고 동기를 부여하는 사람", scores:{D:0,I:3,S:0,C:0}},
    {text:"묵묵히 맡은 일을 안정적으로 수행하는 사람", scores:{D:0,I:0,S:3,C:0}},
    {text:"품질을 점검하고 실수를 방지하는 사람", scores:{D:0,I:0,S:0,C:3}},
  ]},
  {text:"스트레스를 받을 때 나는...", type:"choice", options:[
    {text:"더 강하게 밀어붙이고 통제하려 한다", scores:{D:3,I:0,S:0,C:0}},
    {text:"주변 사람들에게 말하며 감정을 표현한다", scores:{D:0,I:3,S:0,C:0}},
    {text:"속으로 삭이고 조용히 견딘다", scores:{D:0,I:0,S:3,C:0}},
    {text:"혼자 분석하며 해결책을 찾으려 한다", scores:{D:0,I:0,S:0,C:3}},
  ]},
  {text:"나에게 가장 중요한 업무 가치는...", type:"choice", options:[
    {text:"성과와 결과", scores:{D:3,I:0,S:0,C:0}},
    {text:"인정과 즐거움", scores:{D:0,I:3,S:0,C:0}},
    {text:"안정과 조화", scores:{D:0,I:0,S:3,C:0}},
    {text:"정확성과 품질", scores:{D:0,I:0,S:0,C:3}},
  ]},

  // Likert scale questions (1-5)
  {text:"나는 빠른 의사결정을 선호하며, 결정이 늦어지면 답답하다.", type:"scale", dim:"D"},
  {text:"경쟁적인 상황에서 오히려 에너지가 생긴다.", type:"scale", dim:"D"},
  {text:"나는 직설적으로 말하는 편이다.", type:"scale", dim:"D"},
  {text:"주도권을 잡고 이끌어가는 것이 편하다.", type:"scale", dim:"D"},
  {text:"결과가 나오지 않으면 과정이 아무리 좋아도 의미가 없다.", type:"scale", dim:"D"},

  {text:"새로운 사람을 만나는 것이 즐겁고 에너지를 준다.", type:"scale", dim:"I"},
  {text:"아이디어를 말로 표현하는 것을 좋아한다.", type:"scale", dim:"I"},
  {text:"팀의 분위기와 사기가 성과만큼 중요하다고 생각한다.", type:"scale", dim:"I"},
  {text:"나는 낙관적이고 긍정적인 편이다.", type:"scale", dim:"I"},
  {text:"규칙보다는 유연한 환경에서 더 잘 일한다.", type:"scale", dim:"I"},

  {text:"갑작스러운 변화보다는 예측 가능한 환경을 선호한다.", type:"scale", dim:"S"},
  {text:"다른 사람의 부탁을 거절하기 어렵다.", type:"scale", dim:"S"},
  {text:"팀의 화합과 안정이 무엇보다 중요하다.", type:"scale", dim:"S"},
  {text:"한 가지 일을 꾸준히 하는 것이 여러 일을 동시에 하는 것보다 낫다.", type:"scale", dim:"S"},
  {text:"나보다는 팀을 먼저 생각하는 편이다.", type:"scale", dim:"S"},

  {text:"업무를 할 때 세부사항과 정확성이 매우 중요하다.", type:"scale", dim:"C"},
  {text:"감보다는 데이터와 근거를 기반으로 판단한다.", type:"scale", dim:"C"},
  {text:"실수나 오류를 발견하면 그냥 넘어가기 어렵다.", type:"scale", dim:"C"},
];

// Shuffle choice options for each render
let currentQ = 0;
let answers = [];
let userName = "";
let userTeam = "";

function startQuiz() {
  userName = document.getElementById("userName").value.trim() || "익명";
  userTeam = document.getElementById("userTeam").value.trim();
  answers = new Array(questions.length).fill(null);
  currentQ = 0;
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  document.getElementById("progressFill").style.width = ((currentQ)/total*100)+"%";
  document.getElementById("progressText").textContent = `${currentQ+1} / ${total}`;

  let html = `<h2>문항 ${currentQ+1}</h2><p class="q-text">${q.text}</p>`;

  if (q.type === "choice") {
    html += `<p class="q-desc">가장 나와 가까운 것을 하나 선택하세요.</p><div class="options">`;
    q.options.forEach((o,i) => {
      const sel = answers[currentQ] === i ? "selected" : "";
      html += `<div class="opt ${sel}" onclick="selectChoice(${i})"><div class="radio"></div><div class="label">${o.text}</div></div>`;
    });
    html += `</div>`;
  } else {
    html += `<p class="q-desc">나와 얼마나 일치하는지 1~5로 선택하세요.</p><div class="scale-options">`;
    for (let i=1;i<=5;i++) {
      const sel = answers[currentQ] === i ? "selected" : "";
      html += `<div class="scale-opt ${sel}" onclick="selectScale(${i})">${i}</div>`;
    }
    html += `</div><div class="scale-labels"><span>전혀 아니다</span><span>매우 그렇다</span></div>`;
  }

  html += `<div class="nav-btns">`;
  html += currentQ > 0 ? `<button class="btn btn-secondary" onclick="prevQ()">이전</button>` : `<div></div>`;
  if (currentQ < total - 1) {
    html += `<button class="btn btn-primary" id="nextBtn" ${answers[currentQ]===null?'disabled':''} onclick="nextQ()">다음</button>`;
  } else {
    html += `<button class="btn btn-primary" id="nextBtn" ${answers[currentQ]===null?'disabled':''} onclick="showResults()">결과 보기</button>`;
  }
  html += `</div>`;

  document.getElementById("qCard").innerHTML = html;
}

function selectChoice(i) { answers[currentQ]=i; renderQuestion(); }
function selectScale(v) { answers[currentQ]=v; renderQuestion(); }
function nextQ() { if(answers[currentQ]!==null) { currentQ++; renderQuestion(); } }
function prevQ() { currentQ--; renderQuestion(); }

function calcScores() {
  let D=0,I=0,S=0,C=0, dMax=0,iMax=0,sMax=0,cMax=0;
  questions.forEach((q,idx) => {
    if (q.type==="choice") {
      const chosen = q.options[answers[idx]];
      D+=chosen.scores.D; I+=chosen.scores.I; S+=chosen.scores.S; C+=chosen.scores.C;
      dMax+=3; iMax+=3; sMax+=3; cMax+=3; // max per choice question is 3 for one dim
    } else {
      const v = answers[idx];
      if(q.dim==="D"){D+=v; dMax+=5;}
      if(q.dim==="I"){I+=v; iMax+=5;}
      if(q.dim==="S"){S+=v; sMax+=5;}
      if(q.dim==="C"){C+=v; cMax+=5;}
    }
  });
  // Normalize to percentage
  const dPct = Math.round(D/dMax*100);
  const iPct = Math.round(I/iMax*100);
  const sPct = Math.round(S/sMax*100);
  const cPct = Math.round(C/cMax*100);
  return {D:dPct, I:iPct, S:sPct, C:cPct, raw:{D,I,S,C}};
}

const typeInfo = {
  D: {name:"주도형 (Dominance)", color:"#e53e3e", bg:"#fff5f5", icon:"D",
    desc:"목표 지향적이고 결단력이 있으며, 도전을 즐기는 유형입니다.",
    strengths:["빠른 의사결정과 추진력","목표 달성에 대한 강한 집중력","어려운 상황에서의 리더십","효율적인 문제 해결 능력"],
    caution:["타인의 감정을 간과할 수 있음","지나친 통제나 독단적 결정 경향","인내심 부족으로 팀원 성장 기회를 줄일 수 있음","경청보다 지시를 우선할 수 있음"],
    comm:"결론부터 말하고, 구체적 옵션을 제시하세요. 불필요한 잡담은 줄이고 핵심에 집중합니다.",
    leadership:"결과 중심의 명확한 방향 제시가 강점이지만, 과정에서 팀원의 자율성과 의견을 존중하는 연습이 필요합니다."
  },
  I: {name:"사교형 (Influence)", color:"#d69e2e", bg:"#fffff0", icon:"I",
    desc:"열정적이고 사교적이며, 사람들에게 영감을 주는 유형입니다.",
    strengths:["뛰어난 소통과 설득력","긍정적 에너지로 팀 분위기 조성","창의적 아이디어 발상","네트워킹과 관계 구축 능력"],
    caution:["세부사항이나 후속 조치를 놓칠 수 있음","감정에 따라 일관성이 흔들릴 수 있음","현실보다 낙관적으로 판단할 수 있음","체계적 관리보다 즉흥적 진행 경향"],
    comm:"밝고 열린 분위기에서 대화하세요. 아이디어를 인정해주고, 세부 실행은 별도로 정리합니다.",
    leadership:"팀의 동기 부여와 비전 공유가 강점이지만, 실행 관리와 객관적 피드백 역량을 보완하면 더 효과적입니다."
  },
  S: {name:"안정형 (Steadiness)", color:"#38a169", bg:"#f0fff4", icon:"S",
    desc:"인내심이 강하고 협조적이며, 안정적인 환경을 만드는 유형입니다.",
    strengths:["뛰어난 경청과 공감 능력","꾸준하고 신뢰할 수 있는 업무 수행","팀 화합과 협업 촉진","변화 속에서도 안정감을 제공"],
    caution:["변화에 적응하는 데 시간이 필요할 수 있음","갈등을 회피하여 문제가 커질 수 있음","자기 의견 표현이 부족할 수 있음","우선순위 변경에 스트레스를 받을 수 있음"],
    comm:"충분한 시간을 주고 급하게 몰아붙이지 마세요. 변화가 필요할 때는 이유를 충분히 설명합니다.",
    leadership:"팀의 심리적 안전감 구축이 강점이지만, 필요할 때 단호한 의사결정과 변화 주도력을 키우면 좋습니다."
  },
  C: {name:"신중형 (Conscientiousness)", color:"#3182ce", bg:"#ebf8ff", icon:"C",
    desc:"분석적이고 체계적이며, 높은 기준과 정확성을 추구하는 유형입니다.",
    strengths:["정확한 분석과 논리적 판단","높은 품질 기준과 꼼꼼한 실행","체계적인 프로세스 설계","리스크를 사전에 파악하는 능력"],
    caution:["완벽주의로 인해 속도가 느려질 수 있음","과도한 분석으로 결정이 지연될 수 있음","비판적 태도가 타인에게 부담이 될 수 있음","감정적 소통이 부족할 수 있음"],
    comm:"데이터와 근거를 함께 제시하세요. 충분한 검토 시간을 주고, 논리적으로 소통합니다.",
    leadership:"품질 관리와 체계 구축이 강점이지만, 팀원에게 완벽을 요구하기보다 성장을 지원하는 유연함이 필요합니다."
  }
};

function showResults() {
  const sc = calcScores();
  const dims = [{k:"D",v:sc.D},{k:"I",v:sc.I},{k:"S",v:sc.S},{k:"C",v:sc.C}];
  dims.sort((a,b)=>b.v-a.v);
  const primary = dims[0].k;
  const secondary = dims[1].k;
  const info = typeInfo[primary];
  const info2 = typeInfo[secondary];
  const colors = {D:"#e53e3e",I:"#d69e2e",S:"#38a169",C:"#3182ce"};

  // Generate code for team dashboard
  const code = `${userName}\t${userTeam}\t${sc.D}\t${sc.I}\t${sc.S}\t${sc.C}\t${primary}${secondary}`;

  let h = `<h1>나의 DISC 진단 결과</h1>`;
  h += `<p class="name-line">${userName}${userTeam ? " | "+userTeam : ""} | ${new Date().toLocaleDateString('ko-KR')}</p>`;

  // Primary type banner
  h += `<div class="type-banner" style="background:${info.bg};color:${info.color}">`;
  h += `<div class="type-label">주요 행동유형</div>`;
  h += `<div class="type-name">${info.icon} - ${info.name}</div>`;
  h += `<div class="type-desc">${info.desc}</div>`;
  h += `</div>`;

  // Score boxes
  h += `<div class="scores-grid">`;
  [{k:"D",n:"주도형"},{k:"I",n:"사교형"},{k:"S",n:"안정형"},{k:"C",n:"신중형"}].forEach(d => {
    const v = sc[d.k];
    const isPrimary = d.k === primary;
    h += `<div class="score-box" style="background:${isPrimary ? typeInfo[d.k].bg : '#f7fafc'}; border:2px solid ${isPrimary ? colors[d.k] : '#e2e8f0'}; border-radius:12px;">`;
    h += `<div class="s-label" style="color:${colors[d.k]}">${d.k}</div>`;
    h += `<div class="s-value" style="color:${colors[d.k]}">${v}%</div>`;
    h += `<div class="s-name" style="color:#718096">${d.n}</div></div>`;
  });
  h += `</div>`;

  // Bar chart
  h += `<div class="bar-chart">`;
  [{k:"D",n:"주도"},{k:"I",n:"사교"},{k:"S",n:"안정"},{k:"C",n:"신중"}].forEach(d => {
    const v = sc[d.k];
    h += `<div class="bar-row"><div class="bar-label" style="color:${colors[d.k]}">${d.k}</div>`;
    h += `<div class="bar-bg"><div class="bar-fill" style="width:${v}%;background:${colors[d.k]}"><span>${v}%</span></div></div>`;
    h += `<div class="bar-pct" style="color:${colors[d.k]}">${v}%</div></div>`;
  });
  h += `</div>`;

  // Combination type
  h += `<div class="section"><h3>유형 조합: ${primary}${secondary} 타입</h3>`;
  h += `<p>주요 유형은 <strong style="color:${colors[primary]}">${info.name}</strong>이고, `;
  h += `보조 유형은 <strong style="color:${colors[secondary]}">${info2.name}</strong>입니다. `;
  h += getCombinationDesc(primary, secondary);
  h += `</p></div>`;

  // Strengths
  h += `<div class="section"><h3>나의 강점</h3><ul>`;
  info.strengths.forEach(s => h += `<li>${s}</li>`);
  h += `</ul></div>`;

  // Caution
  h += `<div class="section"><h3>주의할 점 (스트레스 상황에서)</h3><ul>`;
  info.caution.forEach(s => h += `<li>${s}</li>`);
  h += `</ul></div>`;

  // Communication
  h += `<div class="section"><h3>나와 소통할 때 이렇게 하면 좋아요</h3><p>${info.comm}</p></div>`;

  // Leadership
  h += `<div class="section"><h3>리더십 성장 포인트</h3><p>${info.leadership}</p></div>`;

  // Traits
  h += `<div class="section"><h3>행동 특성 요약</h3><div class="trait-grid">`;
  h += `<div class="trait-card"><div class="tc-label">의사결정 스타일</div><div class="tc-value">${getDecisionStyle(primary)}</div></div>`;
  h += `<div class="trait-card"><div class="tc-label">업무 환경 선호</div><div class="tc-value">${getWorkEnv(primary)}</div></div>`;
  h += `<div class="trait-card"><div class="tc-label">갈등 대처 방식</div><div class="tc-value">${getConflictStyle(primary)}</div></div>`;
  h += `<div class="trait-card"><div class="tc-label">동기 부여 요소</div><div class="tc-value">${getMotivation(primary)}</div></div>`;
  h += `</div></div>`;

  // Code for team dashboard
  h += `<div class="section"><h3>팀 분석용 코드</h3>`;
  h += `<p>아래 코드를 복사하여 팀장에게 전달하면, 팀 전체 분석에 활용할 수 있습니다.</p>`;
  h += `<div class="copy-code" onclick="copyCode(this)">${code}</div>`;
  h += `</div>`;

  // Retry
  h += `<div style="text-align:center;margin-top:24px;">`;
  h += `<button class="btn btn-secondary" onclick="printResult()" style="margin-right:8px;">인쇄/PDF 저장</button>`;
  h += `<button class="btn btn-primary" onclick="location.reload()">다시 하기</button></div>`;

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("results").classList.remove("hidden");
  document.getElementById("results").innerHTML = h;
}

function getCombinationDesc(p, s) {
  const combos = {
    "DI":"결과를 추구하면서도 사람들을 동기부여하는 역동적인 리더 스타일입니다. 추진력과 소통력을 동시에 갖추고 있습니다.",
    "DC":"목표 달성과 품질 모두를 놓치지 않으려는 성과 지향적 완벽주의 스타일입니다. 높은 기준으로 빠르게 실행합니다.",
    "DS":"결과를 중시하면서도 팀의 안정을 배려하는 균형 잡힌 스타일입니다. 필요할 때 강하게 밀어붙이되 팀원을 챙깁니다.",
    "ID":"사람들에게 영감을 주면서 결과도 만들어내는 카리스마형 리더 스타일입니다. 열정과 추진력이 공존합니다.",
    "IS":"따뜻한 소통으로 사람들을 이끌면서 안정적 관계를 구축하는 스타일입니다. 팀의 분위기 메이커이자 조화를 중시합니다.",
    "IC":"창의적 아이디어와 분석적 사고가 결합된 스타일입니다. 새로운 것을 제안하되 근거를 갖추려 합니다.",
    "SD":"안정적이되 필요할 때 결단력을 발휘하는 스타일입니다. 팀을 묵묵히 지지하다가 중요한 순간에 리더십을 보여줍니다.",
    "SI":"따뜻하고 협조적이며 사람 중심의 스타일입니다. 경청과 공감을 기반으로 자연스럽게 관계를 만들어갑니다.",
    "SC":"꼼꼼하면서도 팀의 조화를 중시하는 안정적 실무형 스타일입니다. 정확한 업무 수행과 팀워크를 동시에 추구합니다.",
    "CD":"분석적 판단과 결단력이 결합된 전략가 스타일입니다. 데이터를 기반으로 빠르게 결정하고 실행합니다.",
    "CI":"분석력과 소통력이 결합된 스타일입니다. 논리적이면서도 사람들과의 교류를 즐깁니다.",
    "CS":"체계적이면서도 팀의 안정을 중시하는 신중한 지원자 스타일입니다. 정확성과 배려가 공존합니다."
  };
  return combos[p+s] || "두 유형이 균형을 이루고 있어 상황에 따라 유연하게 대응할 수 있습니다.";
}

function getDecisionStyle(t) {
  return {D:"빠르고 단호하게",I:"직감과 사람을 고려하여",S:"합의와 안정을 우선하여",C:"데이터와 분석을 기반으로"}[t];
}
function getWorkEnv(t) {
  return {D:"도전적이고 자율적인 환경",I:"활기차고 협력적인 환경",S:"안정적이고 예측 가능한 환경",C:"체계적이고 정확한 환경"}[t];
}
function getConflictStyle(t) {
  return {D:"직접 대면하여 해결",I:"대화와 설득으로 해결",S:"양보하거나 회피",C:"논리와 원칙으로 해결"}[t];
}
function getMotivation(t) {
  return {D:"도전, 성취, 권한",I:"인정, 재미, 사회적 교류",S:"안정, 팀워크, 감사",C:"정확성, 전문성, 자율"}[t];
}

function copyCode(el) {
  navigator.clipboard.writeText(el.textContent).then(() => {
    el.style.background = "#c6f6d5";
    setTimeout(()=>el.style.background="", 1000);
  });
}

function printResult() { window.print(); }
</script>
</body>
</html>
